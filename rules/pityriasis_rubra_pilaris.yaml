# rules/pityriasis_rubra_pilaris.yaml
# Source: Fitzpatrick's Dermatology, Andrews' Diseases of the Skin
- id: PRP_A01
  disease: pityriasis_rubra_pilaris
  tier: A
  weight: 1.0
  conditions:
    - feature: follicular_papules
      threshold: 0.5
    - feature: scaling
      threshold: 0.5

# Follicular papules alone are near-pathognomonic for PRP among the ESD group
- id: PRP_A02
  disease: pityriasis_rubra_pilaris
  tier: A
  weight: 0.9
  conditions:
    - feature: follicular_papules
      threshold: 0.5

- id: PRP_B01
  disease: pityriasis_rubra_pilaris
  tier: B
  weight: 0.6
  conditions:
    - feature: erythema
      threshold: 0.5
    - feature: definite_borders
      threshold: 0.33

- id: PRP_B02
  disease: pityriasis_rubra_pilaris
  tier: B
  weight: 0.6
  conditions:
    - feature: scaling
      threshold: 0.5

- id: PRP_C01
  disease: pityriasis_rubra_pilaris
  tier: C
  weight: 0.3
  conditions:
    - feature: itching
      threshold: 0.33

# Koebner = psoriasis/LP; its presence argues against PRP
- id: PRP_D01
  disease: pityriasis_rubra_pilaris
  tier: D
  weight: 0.4
  competitor: psoriasis
  conditions:
    - feature: koebner_phenomenon
      threshold: 0.5

# Oral mucosal involvement = lichen planus, not PRP
- id: PRP_D02
  disease: pityriasis_rubra_pilaris
  tier: D
  weight: 0.5
  competitor: lichen_planus
  conditions:
    - feature: oral_mucosal_involvement
      threshold: 0.5

# Polygonal papules = lichen planus, not PRP
- id: PRP_D03
  disease: pityriasis_rubra_pilaris
  tier: D
  weight: 0.5
  competitor: lichen_planus
  conditions:
    - feature: polygonal_papules
      threshold: 0.5
