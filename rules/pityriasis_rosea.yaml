# rules/pityriasis_rosea.yaml
# Source: Fitzpatrick's Dermatology, Andrews' Diseases of the Skin
- id: PIT_A01
  disease: pityriasis_rosea
  tier: A
  weight: 1.0
  conditions:
    - feature: definite_borders
      threshold: 0.5
    - feature: scaling
      threshold: 0.33
    - feature: erythema
      threshold: 0.33

- id: PIT_B01
  disease: pityriasis_rosea
  tier: B
  weight: 0.6
  conditions:
    - feature: itching
      threshold: 0.33

- id: PIT_B02
  disease: pityriasis_rosea
  tier: B
  weight: 0.6
  conditions:
    - feature: scaling
      threshold: 0.33

- id: PIT_C01
  disease: pityriasis_rosea
  tier: C
  weight: 0.3
  conditions:
    - feature: erythema
      threshold: 0.33

# Koebner = psoriasis/LP; its presence argues against pityriasis rosea
- id: PIT_D01
  disease: pityriasis_rosea
  tier: D
  weight: 0.4
  competitor: psoriasis
  conditions:
    - feature: koebner_phenomenon
      threshold: 0.5

# Pityriasis rosea typically spares the scalp
- id: PIT_D02
  disease: pityriasis_rosea
  tier: D
  weight: 0.45
  competitor: seborrheic_dermatitis
  conditions:
    - feature: scalp_involvement
      threshold: 0.5

# PR peaks in 15-35 year olds; age >= 0.625 (50 years) argues against it
- id: PIT_D03
  disease: pityriasis_rosea
  tier: D
  weight: 0.35
  competitor: psoriasis
  conditions:
    - feature: age
      threshold: 0.625
